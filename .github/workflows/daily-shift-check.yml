name: Who is on CAS Today

on:
  workflow_dispatch:
  repository_dispatch:
    types: [who-is-on-cas-today]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  send-shift-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run CAS shift report script
        env:
          TZ: Europe/London
          HUMANITY_CLIENT_ID: ${{ secrets.HUMANITY_CLIENT_ID }}
          HUMANITY_CLIENT_SECRET: ${{ secrets.HUMANITY_CLIENT_SECRET }}
          HUMANITY_USERNAME: ${{ secrets.HUMANITY_USERNAME }}
          HUMANITY_PASSWORD: ${{ secrets.HUMANITY_PASSWORD }}
        run: python teams_who_is_on_cas_today.py
